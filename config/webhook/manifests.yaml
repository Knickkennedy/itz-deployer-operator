---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
  - name: vdeployment.kb.io
    admissionReviewVersions:
      - "v1"
    clientConfig:
      service:
        name: itz-deployer-operator-webhook-service
        namespace: itz-deployer-operator-system
        path: /validate-techzone-techzone-ibm-com-v1alpha1-deployment
    failurePolicy: Fail
    rules:
      - apiGroups:
          - techzone.techzone.ibm.com
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - deployments
    sideEffects: None
