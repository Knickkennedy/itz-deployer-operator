apiVersion: v1
kind: Service
metadata:
  name: metrics-service
  namespace: openshift-operators
  annotations:
    # MOVE THE ANNOTATION HERE
    service.beta.openshift.io/serving-cert-secret-name: metrics-server-cert
spec:
  ports:
    - name: https
      port: 8443
      protocol: TCP
      targetPort: metrics # This matches the name in your Deployment patch
  selector:
    # This MUST match the labels on your manager pod
    control-plane: controller-manager
